services:
  postgres:
    image: postgres:16
    container_name: scout-panel-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: scout123
      POSTGRES_DB: scout_panel
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
